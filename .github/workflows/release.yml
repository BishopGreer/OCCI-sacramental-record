name: Package and Release Plugin

# Triggers whenever a version tag (e.g. v1.0.4, v1.0.5) is pushed.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build plugin ZIP
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          ZIPNAME="occi-sacramental-records-${VERSION}.zip"
          # WordPress requires the ZIP to contain a single top-level folder
          # named exactly after the plugin slug (occi-sacramental-records/).
          mkdir -p occi-sacramental-records
          cp -r occi-sacramental-records.php readme.txt includes admin assets \
            occi-sacramental-records/
          zip -r "$ZIPNAME" occi-sacramental-records/ \
            --exclude "*.DS_Store"
          rm -rf occi-sacramental-records
          echo "ZIP_NAME=$ZIPNAME" >> $GITHUB_ENV

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Pull the changelog block for this version out of readme.txt
          NOTES=$(awk "/^= ${VERSION} =/{found=1; next} found && /^= /{exit} found{print}" readme.txt)
          if [ -z "$NOTES" ]; then NOTES="See readme.txt for details."; fi
          # Write to file to preserve newlines
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OCCI Sacramental Records v${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.txt
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false

